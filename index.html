<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Clicker Game Pro</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --primary: #f0b90b;
            --secondary: #d49a00;
            --bg: #0f0f0f;
            --surface: #1e1e1e;
            --accent: #00ff88;
        }
        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--tg-theme-bg-color, var(--bg));
            color: var(--tg-theme-text-color, #ffffff);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            height: 100vh;
            margin: 0;
            padding: 30px 20px;
            overflow: hidden;
            user-select: none;
        }
        .header {
            width: 100%;
            text-align: center;
            z-index: 10;
        }
        #score {
            font-size: 56px;
            font-weight: 900;
            color: var(--primary);
            text-shadow: 0 0 20px rgba(240, 185, 11, 0.4);
            margin: 0;
            transition: transform 0.1s;
        }
        .multiplier-badge {
            background: var(--accent);
            color: #000;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 800;
            display: inline-block;
            margin-top: 5px;
            transform: scale(0);
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .multiplier-active {
            transform: scale(1);
        }
        .game-area {
            flex-grow: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            position: relative;
        }
        .progress-container {
            width: 100%;
            height: 12px;
            background: rgba(255,255,255,0.1);
            border-radius: 6px;
            margin-top: 20px;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.05);
        }
        #progress-bar {
            width: 0%;
            height: 100%;
            background: linear-gradient(to right, var(--primary), var(--accent));
            transition: width 0.3s ease;
            box-shadow: 0 0 10px var(--accent);
        }
        #coin-wrapper {
            position: relative;
            z-index: 2;
        }
        #coin {
            width: 250px;
            height: 250px;
            background: radial-gradient(circle at 30% 30%, #ffd700, var(--secondary));
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 110px;
            cursor: pointer;
            box-shadow:
                0 0 0 10px rgba(255, 255, 255, 0.05),
                0 30px 60px rgba(0,0,0,0.5),
                inset 0 -12px 24px rgba(0,0,0,0.3);
            transition: transform 0.1s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 5px solid rgba(255, 255, 255, 0.2);
            position: relative;
            overflow: hidden;
        }
        #coin::after {
            content: "";
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(45deg, transparent, rgba(255,255,255,0.2), transparent);
            transform: rotate(45deg);
            animation: shine 4s infinite;
        }
        @keyframes shine {
            0% { left: -150%; }
            20% { left: 150%; }
            100% { left: 150%; }
        }
        #coin:active {
            transform: scale(0.9);
        }
        .footer {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            z-index: 10;
        }
        .btn {
            padding: 20px 40px;
            background: linear-gradient(to right, #2481cc, #1c66a3);
            color: #ffffff;
            border: none;
            border-radius: 20px;
            font-size: 20px;
            font-weight: 800;
            cursor: pointer;
            box-shadow: 0 10px 25px rgba(36, 129, 204, 0.4);
            width: 100%;
            max-width: 340px;
            transition: all 0.2s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .btn:active {
            transform: translateY(3px);
            box-shadow: 0 5px 15px rgba(36, 129, 204, 0.4);
        }
        .floating-text {
            position: fixed;
            color: #ffffff;
            font-size: 32px;
            font-weight: 900;
            pointer-events: none;
            animation: float-up 0.8s ease-out forwards;
            z-index: 100;
            text-shadow: 0 0 15px rgba(0,0,0,0.6);
        }
        @keyframes float-up {
            0% { transform: translateY(0) scale(1); opacity: 1; }
            50% { opacity: 1; }
            100% { transform: translateY(-150px) scale(1.8); opacity: 0; }
        }
        .particle {
            position: fixed;
            width: 10px;
            height: 10px;
            background: var(--primary);
            border-radius: 2px;
            pointer-events: none;
            z-index: 90;
            animation: particle-burst 0.7s ease-out forwards;
        }
        @keyframes particle-burst {
            0% { transform: translate(0, 0) rotate(0deg); opacity: 1; }
            100% { transform: translate(var(--dx), var(--dy)) rotate(360deg); opacity: 0; }
        }
    </style>
</head>
<body>
    <div class="header">
        <div id="score">0</div>
        <div id="multiplier-badge" class="multiplier-badge">COMBO x1</div>
        <div class="progress-container">
            <div id="progress-bar"></div>
        </div>
    </div>

    <div class="game-area">
        <div id="coin-wrapper">
            <div id="coin">🪙</div>
        </div>
    </div>

    <div class="footer">
        <button class="btn" onclick="saveAndClose()">ЗАБРАТЬ НАГРАДУ</button>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();

        document.body.style.backgroundColor = tg.themeParams.bg_color || '#0f0f0f';

        let score = 0;
        let lastClickTime = 0;
        let combo = 0;
        let multiplier = 1;

        const coin = document.getElementById('coin');
        const scoreDisplay = document.getElementById('score');
        const progressBar = document.getElementById('progress-bar');
        const multiplierBadge = document.getElementById('multiplier-badge');

        coin.addEventListener('click', (e) => {
            const now = Date.now();

            // Логика комбо
            if (now - lastClickTime < 300) {
                combo++;
            } else {
                combo = 0;
            }
            lastClickTime = now;

            // Расчет множителя (каждые 10 быстрых кликов повышают множитель)
            multiplier = 1 + Math.floor(combo / 10);
            if (multiplier > 5) multiplier = 5; // Максимум x5

            if (multiplier > 1) {
                multiplierBadge.innerText = `COMBO x${multiplier}`;
                multiplierBadge.classList.add('multiplier-active');
            } else {
                multiplierBadge.classList.remove('multiplier-active');
            }

            score += multiplier;
            scoreDisplay.innerText = score;

            // Эффект увеличения счета
            scoreDisplay.style.transform = 'scale(1.1)';
            setTimeout(() => scoreDisplay.style.transform = 'scale(1)', 100);

            // Прогресс бар (цикл по 100 монет)
            const progress = (score % 100);
            progressBar.style.width = `${progress}%`;

            // Эффекты
            const x = e.clientX;
            const y = e.clientY;
            createFloatingText(x, y, `+${multiplier}`);
            createParticles(x, y);

            // Вибрация
            if (tg.HapticFeedback) {
                const intensity = multiplier > 1 ? 'medium' : 'light';
                tg.HapticFeedback.impactOccurred(intensity);
            }
        });

        function createFloatingText(x, y, text) {
            const el = document.createElement('div');
            el.className = 'floating-text';
            el.innerText = text;
            if (multiplier > 1) el.style.color = 'var(--accent)';
            el.style.left = `${x - 20}px`;
            el.style.top = `${y - 40}px`;
            document.body.appendChild(el);
            setTimeout(() => el.remove(), 800);
        }

        function createParticles(x, y) {
            const count = multiplier > 1 ? 12 : 6;
            for (let i = 0; i < count; i++) {
                const p = document.createElement('div');
                p.className = 'particle';
                if (multiplier > 1) p.style.background = 'var(--accent)';
                const angle = Math.random() * Math.PI * 2;
                const dist = 60 + Math.random() * 80;
                p.style.setProperty('--dx', `${Math.cos(angle) * dist}px`);
                p.style.setProperty('--dy', `${Math.sin(angle) * dist}px`);
                p.style.left = `${x}px`;
                p.style.top = `${y}px`;
                document.body.appendChild(p);
                setTimeout(() => p.remove(), 700);
            }
        }

        function saveAndClose() {
            const data = JSON.stringify({
                game: "clicker",
                score: score
            });

            if (tg.sendData) {
                tg.sendData(data);
                setTimeout(() => tg.close(), 100);
            } else {
                tg.close();
            }
        }
    </script>
</body>
</html>
