<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Clicker Game Pro</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --primary: #f0b90b;
            --secondary: #d49a00;
            --bg: #0f0f0f;
            --surface: #1e1e1e;
        }
        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--tg-theme-bg-color, var(--bg));
            color: var(--tg-theme-text-color, #ffffff);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            height: 100vh;
            margin: 0;
            padding: 40px 20px;
            overflow: hidden;
            user-select: none;
        }
        .header {
            width: 100%;
            text-align: center;
        }
        #score {
            font-size: 48px;
            font-weight: 900;
            color: var(--primary);
            text-shadow: 0 0 20px rgba(240, 185, 11, 0.3);
            margin-bottom: 5px;
        }
        .stats {
            font-size: 14px;
            opacity: 0.6;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .game-area {
            flex-grow: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            position: relative;
        }
        #coin-wrapper {
            position: relative;
            z-index: 2;
        }
        #coin {
            width: 240px;
            height: 240px;
            background: radial-gradient(circle at 30% 30%, #ffd700, var(--secondary));
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 100px;
            cursor: pointer;
            box-shadow:
                0 0 0 10px rgba(255, 255, 255, 0.05),
                0 20px 40px rgba(0,0,0,0.4),
                inset 0 -10px 20px rgba(0,0,0,0.2);
            transition: transform 0.1s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 4px solid rgba(255, 255, 255, 0.2);
            position: relative;
            overflow: hidden;
        }
        #coin::after {
            content: "";
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(45deg, transparent, rgba(255,255,255,0.1), transparent);
            transform: rotate(45deg);
            animation: shine 3s infinite;
        }
        @keyframes shine {
            0% { left: -150%; }
            100% { left: 150%; }
        }
        #coin:active {
            transform: scale(0.9);
        }
        .footer {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }
        .btn {
            padding: 18px 40px;
            background: linear-gradient(to right, #2481cc, #1c66a3);
            color: #ffffff;
            border: none;
            border-radius: 16px;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 8px 20px rgba(36, 129, 204, 0.3);
            width: 100%;
            max-width: 320px;
            transition: all 0.2s;
        }
        .btn:active {
            transform: translateY(2px);
            box-shadow: 0 4px 10px rgba(36, 129, 204, 0.3);
        }
        .plus-one {
            position: fixed;
            color: #ffffff;
            font-size: 28px;
            font-weight: 900;
            pointer-events: none;
            animation: float-up 0.7s ease-out forwards;
            z-index: 100;
            text-shadow: 0 0 10px rgba(0,0,0,0.5);
        }
        @keyframes float-up {
            0% { transform: translateY(0) scale(1); opacity: 1; }
            100% { transform: translateY(-120px) scale(1.5); opacity: 0; }
        }
        .particle {
            position: fixed;
            width: 8px;
            height: 8px;
            background: var(--primary);
            border-radius: 50%;
            pointer-events: none;
            z-index: 90;
            animation: particle-burst 0.6s ease-out forwards;
        }
        @keyframes particle-burst {
            0% { transform: translate(0, 0); opacity: 1; }
            100% { transform: translate(var(--dx), var(--dy)); opacity: 0; }
        }
    </style>
</head>
<body>
    <div class="header">
        <div id="score">0</div>
        <div class="stats">Заработано монет</div>
    </div>

    <div class="game-area">
        <div id="coin-wrapper">
            <div id="coin">🪙</div>
        </div>
    </div>

    <div class="footer">
        <button class="btn" onclick="saveAndClose()">ЗАБРАТЬ НАГРАДУ</button>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();

        // Настройка цветов темы
        document.body.style.backgroundColor = tg.themeParams.bg_color || '#0f0f0f';

        let score = 0;
        const coin = document.getElementById('coin');
        const scoreDisplay = document.getElementById('score');

        coin.addEventListener('click', (e) => {
            score++;
            scoreDisplay.innerText = score;

            // Позиция клика для эффектов
            const x = e.clientX;
            const y = e.clientY;

            createPlusOne(x, y);
            createParticles(x, y);

            // Тактильный отклик
            if (tg.HapticFeedback) {
                tg.HapticFeedback.impactOccurred('light');
            }
        });

        function createPlusOne(x, y) {
            const plus = document.createElement('div');
            plus.className = 'plus-one';
            plus.innerText = '+1';
            plus.style.left = `${x - 15}px`;
            plus.style.top = `${y - 30}px`;
            document.body.appendChild(plus);
            setTimeout(() => plus.remove(), 700);
        }

        function createParticles(x, y) {
            for (let i = 0; i < 6; i++) {
                const p = document.createElement('div');
                p.className = 'particle';
                const angle = Math.random() * Math.PI * 2;
                const dist = 50 + Math.random() * 50;
                p.style.setProperty('--dx', `${Math.cos(angle) * dist}px`);
                p.style.setProperty('--dy', `${Math.sin(angle) * dist}px`);
                p.style.left = `${x}px`;
                p.style.top = `${y}px`;
                document.body.appendChild(p);
                setTimeout(() => p.remove(), 600);
            }
        }

        function saveAndClose() {
            const data = JSON.stringify({
                game: "clicker",
                score: score
            });

            if (tg.sendData) {
                tg.sendData(data);
                setTimeout(() => tg.close(), 100);
            } else {
                tg.close();
            }
        }
    </script>
</body>
</html>
